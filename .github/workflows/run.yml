name: Run SIGMET Prototype

on:
  workflow_dispatch:   # lets you click "Run"
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python sigmet_x_prototype.py
